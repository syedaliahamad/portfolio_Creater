<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Resume Builder</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.container {
  display: flex;
  gap: 20px;
  width: 100%;
  max-width: 1100px;
}

.form, .preview {
  background: #1c1c1c;
  padding: 20px;
  border-radius: 10px;
  width: 50%;
}

h2 {
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0 10px;
  border-radius: 5px;
  border: none;
  background: #333;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  background: white;
  color: black;
  font-weight: bold;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #ddd;
}

.preview {
  background: white;
  color: black;
}

.preview h3 {
  margin-bottom: 5px;
}

.section {
  margin-top: 15px;
}
</style>

</head>
<body>

<div class="container">

<div class="form">
  <h2>Resume Builder</h2>

  <input id="name" placeholder="Full Name">
  <input id="email" placeholder="Email">
  <input id="phone" placeholder="Phone">

  <textarea id="summary" placeholder="Summary"></textarea>
  <textarea id="skills" placeholder="Skills (comma separated)"></textarea>
  <textarea id="education" placeholder="Education"></textarea>
  <textarea id="experience" placeholder="Experience"></textarea>

  <button onclick="generateResume()">Generate Resume</button>
  <button onclick="downloadPDF()">Download PDF</button>
</div>

<div class="preview" id="resume">
  <h2>Your Resume</h2>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
function generateResume() {
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const phone = document.getElementById('phone').value;
  const summary = document.getElementById('summary').value;
  const skills = document.getElementById('skills').value;
  const education = document.getElementById('education').value;
  const experience = document.getElementById('experience').value;

  document.getElementById('resume').innerHTML = `
    <h2>${name}</h2>
    <p>${email} | ${phone}</p>

    <div class="section">
      <h3>Summary</h3>
      <p>${summary}</p>
    </div>

    <div class="section">
      <h3>Skills</h3>
      <p>${skills}</p>
    </div>

    <div class="section">
      <h3>Education</h3>
      <p>${education}</p>
    </div>

    <div class="section">
      <h3>Experience</h3>
      <p>${experience}</p>
    </div>
  `;
}

function downloadPDF() {
  const element = document.getElementById('resume');
  html2pdf().from(element).save('resume.pdf');
}
</script>

</body>
</html>
